<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AegisFrame — AI Control Tower · X-Loop³ Labs</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f7;--bg2:#ffffff;--bg3:#f7f8fb;--bg4:#eef0f6;
  --bd:#d8dce6;--bd2:#c5cad6;
  --tx:#1e293b;--tx2:#475569;--tx3:#94a3b8;
  --ac:#0891b2;--ac2:#06b6d4;--ac3:#0e7490;
  --gn:#059669;--gn2:#10b981;
  --am:#d97706;--am2:#f59e0b;
  --rd:#dc2626;--rd2:#ef4444;
  --or:#ea580c;--bl:#2563eb;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',sans-serif;overflow-x:hidden;min-height:100vh}
.mono{font-family:'IBM Plex Mono',monospace}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#ffffff;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{font-family:'Outfit',sans-serif;font-weight:800;font-size:13px;color:var(--ac3);letter-spacing:2px}
.logo span{color:var(--tx3);font-weight:400}
.htitle{font-size:15px;font-weight:600;color:var(--tx)}
.htitle em{font-style:normal;color:var(--ac3);font-weight:700}
.hdiv{width:1px;height:18px;background:var(--bd)}
.hdr-r{display:flex;align-items:center;gap:10px}

/* JURISDICTION TOGGLE */
.jur-sel{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--bd);gap:1px;background:var(--bd)}
.jur-btn{padding:10px 16px;cursor:pointer;font-size:13px;font-weight:600;transition:all .25s;background:#fff;color:var(--tx3);border:none;font-family:'IBM Plex Sans',sans-serif;display:flex;align-items:center;gap:6px}
.jur-btn .jflag{display:flex;align-items:center;line-height:0}
.jur-btn .jflag svg{border-radius:3px;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.jur-btn .jlabel{font-size:11px;font-weight:700;letter-spacing:.5px}
.jur-btn.act{background:var(--ac3);color:white}
.jur-btn:hover:not(.act){background:var(--bg4);color:var(--tx)}

/* LIVE BADGE */
.live-b{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:rgba(5,150,105,.1);font-size:10px;font-weight:600;color:var(--gn)}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--gn);animation:lp 2s infinite}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(5,150,105,.5)}50%{box-shadow:0 0 0 6px rgba(5,150,105,0)}}

/* STATUS BAR */
.status-bar{display:flex;flex-wrap:wrap;gap:8px;padding:10px 24px;background:#fff;border-bottom:1px solid var(--bd);overflow-x:auto}
.status-card{flex:1 1 140px;min-width:120px;padding:8px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--bd)}
.sc-label{font-size:9px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.sc-val{font-size:20px;font-weight:700;font-family:'Outfit',sans-serif}
.sc-sub{font-size:9px;color:var(--tx3);margin-top:2px}

/* MAIN GRID */
.main{display:grid;grid-template-columns:1fr 380px;gap:0;min-height:calc(100vh - 100px)}

/* LEFT: PROMPT AREA */
.left{padding:20px 24px;display:flex;flex-direction:column;gap:16px;border-right:1px solid var(--bd);background:#fff}
.section-title{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.section-title .dot{width:6px;height:6px;border-radius:50%}

/* PROMPT BOX */
.prompt-area{display:flex;flex-direction:column;gap:10px}
.prompt-input{width:100%;min-height:80px;padding:14px;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-family:'IBM Plex Sans',sans-serif;font-size:14px;resize:vertical;outline:none;transition:border .3s}
.prompt-input:focus{border-color:var(--ac2)}
.prompt-input::placeholder{color:var(--tx3)}
.prompt-actions{display:flex;gap:8px;align-items:center}
.btn{padding:8px 18px;border-radius:8px;border:none;font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--ac3),var(--ac2));color:white;box-shadow:0 2px 6px rgba(8,145,178,.25)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{background:#fff;color:var(--tx2);border:1px solid var(--bd)}
.btn-secondary:hover{border-color:var(--ac2);color:var(--ac3);background:rgba(8,145,178,.04)}
.btn-export{background:#fff;color:var(--gn);border:1px solid rgba(5,150,105,.3)}
.btn-export:hover{background:rgba(5,150,105,.06);border-color:var(--gn)}
