# ============================================================
# AegisFrame PSCP Hardware Proof Stack
# X-Loop³ Labs · Kreuzlingen, Switzerland
#
# Run: docker compose up --build
# Requires: NVIDIA GPU + nvidia-container-toolkit installed
# ============================================================

services:
  aegisframe:
    build: .
    runtime: nvidia
    privileged: true  # Required for eBPF kernel probes
    ports:
      - "10000:10000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - AEGISFRAME_MODE=HARDWARE_PROOF
      - AEGISFRAME_VERSION=v0.6.0-enterprise
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro        # eBPF debugfs
      - /proc:/host/proc:ro                            # Process inspection
      - /sys/fs/cgroup:/host/cgroup:ro                 # Cgroup inspection
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
